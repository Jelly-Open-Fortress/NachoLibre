<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        body {
            background-color: #0d1117;
            margin: 0;
            padding: 24px; /* Space around the entire screen edge */
        }
        /* True masonry column layout for a collage look */
        .collage-container {
            column-count: 3; /* Controls how many columns display side-by-side */
            column-gap: 24px; /* The exact spacing padding between columns */
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .gallery-item {
            display: inline-block; /* Essential to prevent image splitting over columns */
            width: 100%;
            margin-bottom: 24px; /* The exact vertical padding between images */
        }
        /* Pure large image style */
        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }
        /* Responsive adjustments for smaller screen profiles */
        @media (max-width: 900px) {
            .collage-container { column-count: 2; }
        }
        @media (max-width: 600px) {
            .collage-container { column-count: 1; }
        }
    </style>
</head>
<body>

    <div class="collage-container" id="gallery"></div>

<script>
    const imageFiles = ['1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg', '6.jpg', '7.jpg', '8.jpg'];

    imageFiles.sort((a, b) => parseInt(a) - parseInt(b));

    const galleryContainer = document.getElementById('gallery');

    imageFiles.forEach(fileName => {
        const item = document.createElement('div');
        item.className = 'gallery-item';

        const img = document.createElement('img');
        img.src = fileName;
        img.alt = fileName;

        item.appendChild(img);
        galleryContainer.appendChild(item);
    });
</script>

</body>
</html>
