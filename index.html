<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        body {
            background-color: #0d1117;
            margin: 0;
            padding: 12px; /* Tight edge profile */
        }
        /* Massive Centered Header Image */
        .title-container {
            display: flex;
            justify-content: center;
            margin-top: 16px;
            margin-bottom: 24px;
        }
        .title-img {
            max-width: 100%;
            height: auto;
            max-height: 350px; /* Made the header significantly larger */
            display: block;
        }
        /* Tight Masonry Collage Grid */
        .collage-container {
            column-count: 3;
            column-gap: 12px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto 40px auto; /* Added extra bottom margin to separate from embed */
        }
        .gallery-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 12px;
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }
        /* Bottom Centered Video Player Container */
        .embed-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 800px; /* Limits player width so it looks crisp */
            margin: 0 auto 32px auto; /* Centered with clear bottom breathing room */
            padding: 0 12px;
            box-sizing: border-box;
        }
        .embed-container iframe {
            width: 100%;
            height: 450px; /* Traditional 16:9 responsive height match */
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); /* Soft depth layer */
            background-color: #000;
        }
        @media (max-width: 900px) {
            .collage-container { column-count: 2; }
            .embed-container iframe { height: 350px; }
        }
        @media (max-width: 600px) {
            .collage-container { column-count: 1; }
            .embed-container iframe { height: 250px; }
        }
    </style>
</head>
<body>

    <!-- Big Headline Title Image -->
    <div class="title-container">
        <img src="NACHO.gif" alt="NACHO" class="title-img">
    </div>

    <!-- Image Collage List -->
    <div class="collage-container" id="gallery"></div>

    <!-- Centered Bottom Video Embed -->
    <div class="embed-container">
        <iframe 
            src="https://pstream.net/media/tmdb-movie-9353-nacho-libre" 
            allowfullscreen 
            scrolling="no"
            loading="lazy">
        </iframe>
    </div>

<script>
    const imageFiles = ['1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg', '6.jpg', '7.jpg', '8.jpg'];

    imageFiles.sort((a, b) => parseInt(a) - parseInt(b));

    const galleryContainer = document.getElementById('gallery');

    imageFiles.forEach(fileName => {
        const item = document.createElement('div');
        item.className = 'gallery-item';

        const img = document.createElement('img');
        img.src = fileName;
        img.alt = fileName;

        item.appendChild(img);
        galleryContainer.appendChild(item);
    });
</script>

</body>
</html>
