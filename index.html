<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        body {
            background-color: #0d1117;
            margin: 0;
            padding: 12px;
            padding-top: 80px; /* Prevents the floating search bar from hiding the NACHO gif */
        }
        /* Sticky Floating Overlay Search Bar */
        .search-overlay {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 500px;
        }
        .search-form {
            width: 100%;
            display: flex;
        }
        .search-input {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            background-color: rgba(22, 27, 34, 0.95); /* Semi-transparent dark styling */
            border: 1px solid #30363d;
            border-radius: 30px; /* Completely rounded pill design */
            color: #c9d1d9;
            outline: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px); /* Smooth blur behind the bar */
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input:focus {
            border-color: #58a6ff;
            box-shadow: 0 4px 25px rgba(88, 166, 255, 0.3);
        }
        /* Massive Centered Header Image */
        .title-container {
            display: flex;
            justify-content: center;
            margin-top: 16px;
            margin-bottom: 24px;
        }
        .title-img {
            max-width: 100%;
            height: auto;
            max-height: 350px;
            display: block;
        }
        /* Tight Masonry Collage Grid */
        .collage-container {
            column-count: 3;
            column-gap: 12px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .gallery-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 12px;
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }
        @media (max-width: 900px) {
            .collage-container { column-count: 2; }
        }
        @media (max-width: 600px) {
            .collage-container { column-count: 1; }
        }
    </style>
</head>
<body>

    <!-- Floating Search Bar Overlay (Submits directly to DuckDuckGo) -->
    <div class="search-overlay">https://pstream.net/media/tmdb-movie-9353-nacho-libre
        <form action="https://duckduckgo.com" method="get" class="search-form">
            <input 
                type="text" 
                name="q" 
                class="search-input" 
                placeholder="Search DuckDuckGo..." 
                required
            >
        </form>
    </div>

    <!-- Big Headline Title Image -->
    <div class="title-container">
        <img src="NACHO.gif" alt="NACHO" class="title-img">
    </div>

    <!-- Image Collage List -->
    <div class="collage-container" id="gallery"></div>

<script>
    const imageFiles = ['1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg', '6.jpg', '7.jpg', '8.jpg'];

    imageFiles.sort((a, b) => parseInt(a) - parseInt(b));

    const galleryContainer = document.getElementById('gallery');

    imageFiles.forEach(fileName => {
        const item = document.createElement('div');
        item.className = 'gallery-item';

        const img = document.createElement('img');
        img.src = fileName;
        img.alt = fileName;

        item.appendChild(img);
        galleryContainer.appendChild(item);
    });
</script>

</body>
</html>
