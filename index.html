<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        body {
            background-color: #0d1117;
            margin: 0;
            padding: 32px; /* Large padding around the screen edge */
        }
        /* Pure image grid with large column sizes and gaps */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); /* Increased item size */
            gap: 32px; /* Keeps spacious padding between images */
        }
        .gallery-item {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        /* Maximizes the actual image size with zero backgrounds or borders */
        .gallery-item img {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>

    <div class="gallery-grid" id="gallery"></div>

<script>
    const imageFiles = ['1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg', '6.jpg', '7.jpg', '8.jpg'];

    imageFiles.sort((a, b) => parseInt(a) - parseInt(b));

    const galleryContainer = document.getElementById('gallery');

    imageFiles.forEach(fileName => {
        const item = document.createElement('div');
        item.className = 'gallery-item';

        const img = document.createElement('img');
        img.src = fileName;
        img.alt = fileName;

        item.appendChild(img);
        galleryContainer.appendChild(item);
    });
</script>

</body>
</html>
