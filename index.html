<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        body {
            background-color: #0d1117;
            margin: 0;
            padding: 12px; /* Tightened edge padding around the screen */
        }
        /* Title image container */
        .title-container {
            display: flex;
            justify-content: center;
            margin-bottom: 16px; /* Spacing between title gif and the collage */
        }
        .title-img {
            max-width: 100%;
            height: auto;
            max-height: 150px; /* Limits size so it doesn't overpower the layout */
            display: block;
        }
        /* Collage structure with tighter boundaries */
        .collage-container {
            column-count: 3;
            column-gap: 12px; /* Reduced padding between image columns */
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .gallery-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 12px; /* Reduced padding between vertically stacked images */
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }
        @media (max-width: 900px) {
            .collage-container { column-count: 2; }
        }
        @media (max-width: 600px) {
            .collage-container { column-count: 1; }
        }
    </style>
</head>
<body>

    <!-- Title Image at the Top -->
    <div class="title-container">
        <img src="NACHO.gif" alt="NACHO" class="title-img">
    </div>

    <!-- Image Collage -->
    <div class="collage-container" id="gallery"></div>

<script>
    const imageFiles = ['1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg', '6.jpg', '7.jpg', '8.jpg'];

    imageFiles.sort((a, b) => parseInt(a) - parseInt(b));

    const galleryContainer = document.getElementById('gallery');

    imageFiles.forEach(fileName => {
        const item = document.createElement('div');
        item.className = 'gallery-item';

        const img = document.createElement('img');
        img.src = fileName;
        img.alt = fileName;

        item.appendChild(img);
        galleryContainer.appendChild(item);
    });
</script>

</body>
</html>
