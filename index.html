<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacho Libre Browser</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body { 
            background: linear-gradient(135deg, #005f73 0%, #ae2012 50%, #ca6702 100%); 
            background-attachment: fixed; 
            margin: 0; 
            padding: 12px; 
            box-sizing: border-box;
            font-family: sans-serif;
        }

        /* Top Title Section */
        .title-container { 
            display: flex; 
            justify-content: center; 
            margin: 20px auto;
            max-width: 1400px;
        }
        .title-img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* Centered Search Bar Container */
        .search-overlay { 
            width: 90%; 
            max-width: 580px; 
            margin: 24px auto; 
        }
        .search-form { 
            width: 100%; 
            display: flex; 
        }
        .search-input { 
            width: 100%; 
            padding: 14px 24px; 
            font-size: 16px; 
            background-color: rgba(22, 27, 34, 0.95); 
            border: 1px solid #30363d; 
            border-radius: 30px; 
            color: #c9d1d9; 
            outline: none; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(8px); 
            transition: border-color 0.2s, box-shadow 0.2s; 
        }
        .search-input:focus { 
            border-color: #58a6ff; 
            box-shadow: 0 4px 25px rgba(88, 166, 255, 0.3); 
        }

        /* Tight Masonry Collage Grid */
        .collage-container { 
            column-count: 3; 
            column-gap: 12px; 
            width: 100%; 
            max-width: 1400px; 
            margin: 24px auto; 
        }
        .gallery-item { 
            display: inline-block; 
            width: 100%; 
            margin-bottom: 12px; 
        }
        .gallery-item img { 
            width: 100%; 
            height: auto; 
            display: block; 
            object-fit: contain; 
            border-radius: 4px;
        }

        /* Bottom Centered Video Player Container */
        .embed-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            max-width: 800px; 
            margin: 40px auto; 
        }
        .embed-container iframe { 
            width: 100%; 
            height: 450px; 
            border: none; 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); 
            background-color: #000; 
        }

        /* Responsive Breakpoints */
        @media (max-width: 900px) { 
            .collage-container { 
                column-count: 2; 
            } 
            .embed-container iframe { 
                height: 350px; 
            } 
        }
        @media (max-width: 600px) { 
            .collage-container { 
                column-count: 1; 
            } 
            .embed-container iframe { 
                height: 250px; 
            } 
        }
    </style>
</head>
<body>

    <!-- Big Headline Title Image -->
    <div class="title-container">
        <img src="NACHO.gif" alt="NACHO" class="title-img">
    </div>

    <!-- Front and Center Search Bar -->
    <div class="search-overlay">
        <form action="https://duckduckgo.com" method="get" class="search-form">
            <input type="text" name="q" class="search-input" placeholder="Search DuckDuckGo..." required>
        </form>
    </div>

    <!-- Pure Image Collage List -->
    <div class="collage-container" id="gallery"></div>

    <!-- Centered Bottom Video Embed -->
    <div class="embed-container">
        <iframe src="https://pstream.net" allowfullscreen scrolling="no" loading="lazy"></iframe>
    </div>

    <script>
        const imageFiles = ['1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg', '6.jpg', '7.jpg', '8.jpg', '9.jpg', '10.jpg', '11.jpg'];

        // Fisher-Yates Shuffle Algorithm to randomize the order safely
        for (let i = imageFiles.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [imageFiles[i], imageFiles[j]] = [imageFiles[j], imageFiles[i]];
        }

        const galleryContainer = document.getElementById('gallery');

        // Render the shuffled elements
        imageFiles.forEach(fileName => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            
            const img = document.createElement('img');
            img.src = fileName;
            img.alt = fileName;
            
            item.appendChild(img);
            galleryContainer.appendChild(item);
        });
    </script>
</body>
</html>
