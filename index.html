<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numeric Gallery</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 24px;
        }
        .container {
            max-width: 1012px;
            margin: 0 auto;
        }
        .repo-header {
            border-bottom: 1px solid #21262d;
            padding-bottom: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .repo-title {
            font-size: 20px;
            font-weight: 600;
            color: #58a6ff;
        }
        .repo-title span {
            color: #8b949e;
            font-weight: 400;
            margin: 0 4px;
        }
        .btn-upload {
            position: relative;
            background-color: #238636;
            color: #ffffff;
            padding: 5px 16px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            border: 1px solid rgba(240,246,252,0.1);
            cursor: pointer;
            display: inline-block;
        }
        .btn-upload:hover {
            background-color: #2ea043;
        }
        .btn-upload input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .repo-box {
            border: 1px solid #30363d;
            border-radius: 6px;
            background-color: #161b22;
            overflow: hidden;
        }
        .repo-box-header {
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 16px;
            font-size: 14px;
            color: #8b949e;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            padding: 24px;
        }
        .gallery-item {
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: border-color 0.2s;
        }
        .gallery-item:hover {
            border-color: #58a6ff;
        }
        .img-container {
            width: 100%;
            height: 160px;
            background-color: #161b22;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #30363d;
            padding: 8px;
            box-sizing: border-box;
        }
        .gallery-item img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .file-info {
            padding: 8px 12px;
            font-size: 12px;
            color: #c9d1d9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background-color: #161b22;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="repo-header">
        <div class="repo-title">
            image-loader<span>/</span><strong>numeric-gallery</strong>
        </div>
        <div class="btn-upload">
            Add files
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>
    </div>

    <div class="repo-box">
        <div class="repo-box-header" id="statusHeader">
            0 numeric files found. Upload images to populate the gallery grid.
        </div>
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>
</div>

<script>
    document.getElementById('fileInput').addEventListener('change', function(event) {
        const files = Array.from(event.target.files);
        const galleryGrid = document.getElementById('galleryGrid');
        const statusHeader = document.getElementById('statusHeader');
        
        galleryGrid.innerHTML = '';

        const validFiles = files
            .map(file => {
                const nameWithoutExt = file.name.substring(0, file.name.lastIndexOf('.'));
                const isNumeric = /^\d+$/.test(nameWithoutExt);
                return {
                    file: file,
                    isValid: isNumeric,
                    numValue: isNumeric ? parseInt(nameWithoutExt, 10) : null
                };
            })
            .filter(item => item.isValid);

        validFiles.sort((a, b) => a.numValue - b.numValue);
        statusHeader.textContent = `${validFiles.length} numeric file${validFiles.length === 1 ? '' : 's'} sorted successfully.`;

        validFiles.forEach(item => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'gallery-item';

                const imgContainer = document.createElement('div');
                imgContainer.className = 'img-container';

                const img = document.createElement('img');
                img.src = e.target.result;
                img.alt = item.file.name;

                const fileInfo = document.createElement('div');
                fileInfo.className = 'file-info';
                fileInfo.textContent = item.file.name;

                imgContainer.appendChild(img);
                itemDiv.appendChild(imgContainer);
                itemDiv.appendChild(fileInfo);
                galleryGrid.appendChild(itemDiv);
            };
            reader.readAsDataURL(item.file);
        });
    });
</script>

</body>
</html>
